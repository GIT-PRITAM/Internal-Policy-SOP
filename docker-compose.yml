services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-internal_policy}
      POSTGRES_USER: ${DB_USERNAME:-internal_policy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-internal_policy_pass}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - appnet

  laravel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:?Set APP_KEY in the root .env file}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-internal_policy}
      DB_USERNAME: ${DB_USERNAME:-internal_policy_user}
      DB_PASSWORD: ${DB_PASSWORD:-internal_policy_pass}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    networks:
      - appnet

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - laravel
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

volumes:
  db_data:

networks:
  appnet:
    driver: bridge
